        let currentFilter = 'all';
        
        function renderArtists() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('artistsGrid');
            
            let filtered = ARTISTS_DATABASE.filter(artist => {
                const matchesFilter = currentFilter === 'all' || 
                                    artist.stance === currentFilter || 
                                    artist.category === currentFilter;
                const matchesSearch = artist.name.toLowerCase().includes(searchTerm) ||
                                    (artist.country && artist.country.toLowerCase().includes(searchTerm));
                return matchesFilter && matchesSearch;
            });
            
            // Stats are now static (no need to update)
            
            grid.innerHTML = filtered.map(artist => `
                <div class="artist-card" onclick="showArtistDetails(${artist.id})" style="cursor: pointer;">
                    <div class="artist-header">
                        <div>
                            <div class="artist-name">${artist.name}</div>
                            <div class="artist-category">${artist.category}</div>
                        </div>
                        <div class="stance-badge stance-${artist.stance}">${artist.stance === 'boycott' ? 'BOYCOTTER' : 'CRITICAL'}</div>
                    </div>
                    <div class="artist-statement">${artist.statement}</div>
                    <div class="artist-sources">
                        <div class="sources-label">Click for sources →</div>
                    </div>
                </div>
            `).join('');
        }

            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderArtists();
            });
        });

        // Autocomplete
        (function() {
            const input = document.getElementById('searchInput');
            const dropdown = document.getElementById('autocompleteList');
            let activeIndex = -1;

            function getMatches(query) {
                if (query.length < 2) return [];
                const q = query.toLowerCase();
                return ARTISTS_DATABASE
                    .filter(a => a.name.toLowerCase().includes(q))
                    .slice(0, 8);
            }

            function highlight(text, query) {
                const idx = text.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return text;
                return text.slice(0, idx) +
                    '<mark>' + text.slice(idx, idx + query.length) + '</mark>' +
                    text.slice(idx + query.length);
            }

            function showDropdown(matches, query) {
                activeIndex = -1;
                if (matches.length === 0) {
                    dropdown.classList.remove('visible');
                    return;
                }
                dropdown.innerHTML = matches.map((a, i) =>
                    `<div class="autocomplete-item" data-index="${i}">${highlight(a.name, query)}</div>`
                ).join('');
                dropdown.querySelectorAll('.autocomplete-item').forEach((el, i) => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        selectItem(matches[i].name);
                    });
                });
                dropdown.classList.add('visible');
            }

            function hideDropdown() {
                dropdown.classList.remove('visible');
                activeIndex = -1;
            }

            function selectItem(name) {
                input.value = name;
                hideDropdown();
                renderArtists();
            }

            function updateActiveItem() {
                dropdown.querySelectorAll('.autocomplete-item').forEach((el, i) => {
                    el.classList.toggle('ac-active', i === activeIndex);
                });
            }

            input.addEventListener('input', function() {
                const query = this.value.trim();
                const matches = getMatches(query);
                showDropdown(matches, query);
                renderArtists();
            });

            input.addEventListener('keydown', function(e) {
                const items = dropdown.querySelectorAll('.autocomplete-item');
                if (!dropdown.classList.contains('visible') || items.length === 0) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIndex = Math.min(activeIndex + 1, items.length - 1);
                    updateActiveItem();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIndex = Math.max(activeIndex - 1, -1);
                    updateActiveItem();
                } else if (e.key === 'Enter' && activeIndex >= 0) {
                    e.preventDefault();
                    const matches = getMatches(this.value.trim());
                    if (matches[activeIndex]) selectItem(matches[activeIndex].name);
                } else if (e.key === 'Escape') {
                    hideDropdown();
                }
            });

            input.addEventListener('blur', () => setTimeout(hideDropdown, 150));
        })();

                        All information from publicly documented sources. Independently verifiable.
                    </div>

            `;
            
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        const urlParams = new URLSearchParams(window.location.search);

                a.name.toLowerCase() === artistName.toLowerCase()
